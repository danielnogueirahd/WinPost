<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acesso Negado | WinPost</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        body { background-color: #f8f9fa; }
        .icone-bloqueio { font-size: 5rem; color: #dc3545; }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="text-center px-3">
        <img src="/img/logoInput.png" alt="Logótipo WINPOST" class="mb-4 bg-primary rounded px-3 py-1 shadow-sm" style="height: 50px;">
        
        <div class="card shadow-lg border-0 rounded-3 p-5" style="max-width: 550px; margin: 0 auto;">
            <div class="mb-4">
                <i class="fa-solid fa-shield-halved icone-bloqueio"></i>
            </div>
            
            <h1 class="fw-bold text-dark mb-3">Acesso Restrito</h1>
            
            <p class="text-muted mb-4 fs-5">
                Ops! Parece que o seu perfil não tem permissão para acessar esta área ou executar esta ação no sistema.
            </p>
            
            <a href="/administrativo" class="btn btn-primary btn-lg fw-bold rounded-pill px-5 shadow-sm">
                <i class="fa-solid fa-arrow-left me-2"></i> Voltar ao Dashboard
            </a>
        </div>
        
        <p class="mt-4 text-muted small fw-bold">
            Acredita que isso é um engano? Solicite o acesso ao Administrador do sistema.
        </p>
    </div>

</body>
</html>
