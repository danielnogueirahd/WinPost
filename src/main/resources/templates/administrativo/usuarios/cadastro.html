<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Novo Utilizador | WinPost</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="/css/estilo.css">
</head>

<body class="bg-light">

	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container mt-5 mb-5" style="max-width: 800px;">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h3 class="fw-bold text-dark">
				<i class="fa-solid fa-user-plus text-primary me-2"></i>Registar Novo
				Utilizador
			</h3>
			<a href="/administrativo/usuarios"
				class="btn btn-outline-secondary rounded-pill fw-bold"> <i
				class="fa-solid fa-arrow-left me-2"></i>Voltar
			</a>
		</div>

		<div class="card border-0 shadow-sm rounded-4 overflow-hidden">
			<form th:action="@{/administrativo/usuarios/salvar}" method="POST"
				th:object="${usuario}">
				<input type="hidden" th:field="*{id}">
				<div class="card-body p-5">
					<div class="row g-4">

						<div class="col-md-12">
							<label class="form-label fw-bold text-secondary small">Nome
								Completo</label>
							<div class="input-group">
								<span class="input-group-text bg-light border-end-0 text-muted"><i
									class="fa-regular fa-id-card"></i></span> <input type="text"
									class="form-control bg-light border-start-0 py-2"
									th:field="*{nome}" placeholder="Ex: João Silva" required>
							</div>
						</div>

						<div class="col-md-6">
							<label class="form-label fw-bold text-secondary small">E-mail</label>
							<div class="input-group">
								<span class="input-group-text bg-light border-end-0 text-muted"><i
									class="fa-regular fa-envelope"></i></span> <input type="email"
									class="form-control bg-light border-start-0 py-2"
									th:field="*{email}" placeholder="joao@empresa.com" required>
							</div>
						</div>

						<div class="col-md-6">
							<label class="form-label fw-bold text-secondary small">Nome
								de Utilizador (Login)</label>
							<div class="input-group">
								<span class="input-group-text bg-light border-end-0 text-muted"><i
									class="fa-solid fa-at"></i></span> <input type="text"
									class="form-control bg-light border-start-0 py-2"
									th:field="*{username}" placeholder="joao.silva" required>
							</div>
						</div>

						<div class="col-md-6">
							<label class="form-label fw-bold text-secondary small">Palavra-passe</label>
							<div class="input-group">
								<span class="input-group-text bg-light border-end-0 text-muted"><i
									class="fa-solid fa-lock"></i></span> <input type="password"
									class="form-control bg-light border-start-0 py-2"
									th:field="*{senha}"
									th:placeholder="${usuario.id == null ? 'Mínimo 6 caracteres' : 'Deixe em branco para não alterar'}"
									th:required="${usuario.id == null}">
							</div>
						</div>

						<div class="col-md-6">
							<label class="form-label fw-bold text-secondary small">Perfil
								de Acesso</label>
							<div class="input-group">
								<span class="input-group-text bg-light border-end-0 text-muted"><i
									class="fa-solid fa-shield-halved"></i></span> <select
									class="form-select bg-light border-start-0 py-2"
									th:field="*{perfil}" required>
									<option value="" disabled selected>Selecione um
										perfil...</option>
									<option th:each="p : ${listaPerfis}" th:value="${p.id}"
										th:text="${p.nome}"></option>
								</select>
							</div>
						</div>

					</div>
				</div>

				<div class="card-footer bg-white border-top-0 p-4 text-end">
					<button type="submit"
						class="btn btn-primary rounded-pill px-5 py-2 fw-bold shadow-sm">
						<i class="fa-solid fa-check me-2"></i>Salvar Utilizador
					</button>
				</div>

			</form>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
