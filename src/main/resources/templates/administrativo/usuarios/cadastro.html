<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Novo Utilizador | WinPost</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="/css/estilo.css">

<style>
/* Pequenos toques para deixar os inputs mais premium */
.input-group-text {
	transition: all 0.3s ease;
}

.form-control:focus, .form-select:focus {
	border-color: #0d6efd;
	box-shadow: none;
	background-color: rgba(13, 110, 253, 0.03) !important;
}

.form-control:focus ~ .input-group-text, .form-select:focus ~
	.input-group-text, .input-group:focus-within .input-group-text {
	border-color: #0d6efd;
	color: #0d6efd !important;
	background-color: rgba(13, 110, 253, 0.05) !important;
}

.card-section-title {
	font-size: 0.95rem;
	letter-spacing: 0.5px;
	text-transform: uppercase;
}
</style>
</head>

<body class="bg-light pt-5">
	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container mt-5 mb-5" style="max-width: 900px;">
		<div
			class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
			<div
				class="d-flex align-items-center ps-3 border-start border-4 border-primary">
				<div>
					<h2 class="fw-bold text-dark mb-0 h3"
						th:text="${usuario.id == null ? 'Registar Novo Utilizador' : 'Editar Utilizador'}">Registar
						Utilizador</h2>
					<p class="text-muted mb-0 small">Preencha os dados abaixo para
						gerenciar o acesso ao sistema.</p>
				</div>
			</div>

			<a href="/administrativo/usuarios"
				class="btn btn-outline-secondary shadow-sm fw-bold rounded-pill px-4">
				<i class="fa-solid fa-arrow-left me-2"></i>Voltar
			</a>
		</div>

		<div class="card border-0 shadow-sm rounded-4 overflow-hidden">
			<form th:action="@{/administrativo/usuarios/salvar}" method="POST"
				th:object="${usuario}">
				<input type="hidden" th:field="*{id}">

				<div class="card-body p-4 p-md-5">

					<h6
						class="fw-bold text-primary mb-4 border-bottom pb-2 card-section-title">
						<i class="fa-regular fa-id-badge me-2"></i>Informações Pessoais
					</h6>

					<div class="row g-4 mb-5">
						<div class="col-md-7">
							<label class="form-label fw-bold text-secondary small">Nome
								Completo</label>
							<div class="input-group">
								<span class="input-group-text bg-white text-muted"><i
									class="fa-regular fa-id-card"></i></span> <input type="text"
									class="form-control bg-white border-start-0 py-2 ps-0"
									th:field="*{nome}" placeholder="Ex: João Silva" required>
							</div>
						</div>

						<div class="col-md-5">
							<label class="form-label fw-bold text-secondary small">E-mail</label>
							<div class="input-group">
								<span class="input-group-text bg-white text-muted"><i
									class="fa-regular fa-envelope"></i></span> <input type="email"
									class="form-control bg-white border-start-0 py-2 ps-0"
									th:field="*{email}" placeholder="joao@empresa.com" required>
							</div>
						</div>
					</div>

					<h6
						class="fw-bold text-primary mb-4 border-bottom pb-2 card-section-title">
						<i class="fa-solid fa-shield-halved me-2"></i>Acesso e Segurança
					</h6>

					<div class="row g-4">
						<div class="col-md-4">
							<label class="form-label fw-bold text-secondary small">Nome
								de Login</label>
							<div class="input-group">
								<span class="input-group-text bg-white text-muted"><i
									class="fa-solid fa-at"></i></span> <input type="text"
									class="form-control bg-white border-start-0 py-2 ps-0"
									th:field="*{username}" placeholder="joao.silva" required>
							</div>
						</div>

						<div class="col-md-4">
							<label class="form-label fw-bold text-secondary small">Palavra-passe</label>
							<div class="input-group">
								<span class="input-group-text bg-white text-muted"><i
									class="fa-solid fa-lock"></i></span> <input type="password"
									class="form-control bg-white border-start-0 py-2 ps-0"
									th:field="*{senha}"
									th:placeholder="${usuario.id == null ? 'Mínimo 6 caracteres' : 'Vazio = não alterar'}"
									th:required="${usuario.id == null}">
							</div>
						</div>

						<div class="col-md-6">
							<label for="perfil" class="form-label fw-semibold text-dark">Perfil
								de Acesso</label>
							<div class="input-group">
								<span class="input-group-text bg-white border-end-0"><i
									class="bi bi-person-badge"></i></span> <select
									class="form-select border-start-0" id="perfil"
									th:field="*{perfil}" required>
									<option value="">Selecione um perfil...</option>
									<option th:each="p : ${listaPerfis}" th:value="${p.id}"
										th:text="${p.nome}"></option>
								</select>
							</div>
						</div>
					</div>

				</div>

				<div
					class="card-footer bg-light border-top p-4 d-flex justify-content-end gap-2 rounded-bottom-4">
					<a href="/administrativo/usuarios"
						class="btn btn-link text-muted text-decoration-none fw-bold px-4 py-2">
						Cancelar </a>
					<button type="submit"
						class="btn btn-primary rounded-pill px-5 py-2 fw-bold shadow-sm">
						<i class="fa-solid fa-check me-2"></i>Salvar Utilizador
					</button>
				</div>

			</form>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
