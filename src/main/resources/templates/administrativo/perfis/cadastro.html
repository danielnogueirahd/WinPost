<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registo de Perfil | WinPost</title>

<link
	href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
	rel="stylesheet">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="/css/estilo.css">

<style>
/* Tipografia Base e Fundo */
body {
	font-family: 'Inter', sans-serif;
	background-color: #f8f9fc !important;
}

/* Cartão Principal Premium */
.card-premium {
	border-radius: 16px;
	box-shadow: 0 8px 30px rgba(0, 0, 0, 0.03);
	border: 1px solid rgba(0, 0, 0, 0.05) !important;
}

/* Estilização Customizada do Input Group (Foco Elevado) */
.input-group-custom {
	border-radius: 12px;
	border: 2px solid #eaedf1;
	transition: all 0.3s ease;
	background-color: #fff;
	padding: 0.25rem;
}

.input-group-custom:focus-within {
	border-color: #0d6efd;
	box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
}

.input-group-custom .input-group-text, .input-group-custom .form-control
	{
	border: none !important;
	background: transparent !important;
	box-shadow: none !important;
}

/* Títulos de Seção */
.section-label {
	font-size: 0.75rem;
	text-transform: uppercase;
	letter-spacing: 0.08em;
	font-weight: 700;
	color: #6c757d;
	margin-bottom: 0.75rem;
	display: block;
}

/* Cards de Permissão Individuais */
.permission-card {
	border-radius: 12px;
	border: 2px solid #eaedf1;
	transition: all 0.2s ease-in-out;
	background-color: #fff;
}

.permission-card:hover {
	border-color: #d1e2ff;
	transform: translateY(-2px);
	box-shadow: 0 4px 12px rgba(13, 110, 253, 0.06);
}

/* Destaca o card inteiro quando o switch está marcado (Suporte a navegadores modernos) */


/* Aumenta um pouco o switch para melhor usabilidade */
.form-switch .form-check-input {
	width: 2.5em;
	height: 1.25em;
}

.form-switch .form-check-input:checked {
	background-color: #0d6efd;
	border-color: #0d6efd;
}
</style>
</head>

<body class="d-flex flex-column min-vh-100">

	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container mt-5 mb-5" style="max-width: 900px;">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<div
				class="d-flex align-items-center ps-3 border-start border-4 border-primary rounded-1">
				<div>
					<h3 class="fw-bold text-dark mb-0 h4">Registrar Novo Perfil</h3>
					<p class="text-muted small mt-1 mb-0">Defina o nome do cargo e
						configure seus níveis de acesso.</p>
				</div>
			</div>
			<a href="/administrativo/perfis"
				class="btn btn-light border rounded-pill fw-bold text-secondary shadow-sm px-4 transition-all hover-primary">
				<i class="fa-solid fa-arrow-left me-2"></i>Voltar
			</a>
		</div>

		<div class="card card-premium overflow-hidden bg-white">
			<form th:action="@{/administrativo/perfis/salvar}" method="POST"
				th:object="${perfil}">

				<input type="hidden" th:field="*{id}">

				<div class="card-body p-4 p-md-5">

					<div class="row mb-5">
						<div class="col-md-12">
							<label class="section-label">Nome do Perfil</label>

							<div class="input-group input-group-custom shadow-none border-1">
								<span class="input-group-text text-primary ps-3 pe-0"><i
									class="fa-solid fa-id-badge"></i></span> <input type="text"
									class="form-control fw-semibold text-dark" th:field="*{nome}"
									placeholder="Ex: Administrador" required>
							</div>

							<div
								class="d-flex align-items-start mt-2 p-2 rounded-3 bg-warning bg-opacity-10 border border-warning border-opacity-10">
								<i
									class="fa-solid fa-triangle-exclamation text-warning me-2 mt-1 shadow-none"
									style="font-size: 0.85rem;"></i> <span
									class="text-warning-emphasis small fw-medium"> <strong>Atenção:</strong>
									Utilize nomes curtos e em maiúsculas para facilitar a
									identificação.
								</span>
							</div>
						</div>
					</div>

					<div class="card border-0 rounded-4 shadow-sm"
						style="background-color: #f1f5ff; border: 1px solid #e2e8f0 !important;">
						<div
							class="card-header bg-transparent border-bottom-0 pt-4 pb-0 px-4 d-flex justify-content-between align-items-center flex-wrap gap-2">
							<div>
								<h6 class="mb-1 fw-bold text-dark">
									<i class="fa-solid fa-shield-check text-primary me-2"></i>Permissões
									de Acesso
								</h6>
								<small class="text-muted">Selecione o que os
									utilizadores com este perfil poderão fazer no sistema.</small>
							</div>
							<button type="button"
								class="btn btn-sm btn-outline-primary bg-white rounded-pill fw-bold shadow-sm px-3 border-2"
								id="btnSelectAll" style="font-size: 0.75rem;">
								<i class="fa-solid fa-check-double me-1"></i>Marcar Todas
							</button>
						</div>

						<div class="card-body p-4">
							<div class="row g-3">
								<div class="col-md-4 col-sm-6"
									th:each="permissao : ${todasPermissoes}">
									<div
										class="permission-card p-3 h-100 d-flex justify-content-between align-items-center bg-white border-0 shadow-sm transition-all"
										style="border-radius: 12px;">

										<label
											class="form-check-label fw-bold text-dark mb-0 flex-grow-1"
											style="cursor: pointer; font-size: 0.82rem;"
											th:for="${'check_' + permissao}"
											th:text="${#strings.replace(permissao, '_', ' ')}">
											NOME DA PERMISSAO </label>

										<div
											class="form-check form-switch m-0 p-0 ms-3 d-flex align-items-center">
											<input
												class="form-check-input m-0 toggle-permissao shadow-sm"
												style="cursor: pointer; width: 2.4em; height: 1.2em;"
												type="checkbox" role="switch" th:value="${permissao}"
												th:field="*{permissoes}" th:id="${'check_' + permissao}">
										</div>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>

				<div
					class="card-footer bg-white border-top p-4 d-flex justify-content-end bg-light">
					<button type="submit"
						class="btn btn-primary rounded-pill px-5 py-2 fw-bold shadow-sm d-inline-flex align-items-center transition-all">
						<i class="fa-solid fa-floppy-disk me-2"></i>Guardar Perfil
					</button>
				</div>

			</form>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

	<script>
        document.addEventListener('DOMContentLoaded', function() {
            const btnSelectAll = document.getElementById('btnSelectAll');
            const checkboxes = document.querySelectorAll('.toggle-permissao');
            let todasSelecionadas = false;

            btnSelectAll.addEventListener('click', function() {
                todasSelecionadas = !todasSelecionadas;
                checkboxes.forEach(chk => chk.checked = todasSelecionadas);
                
                if(todasSelecionadas) {
                    this.innerHTML = '<i class="fa-solid fa-eraser me-1"></i>Desmarcar Todas';
                    this.classList.replace('btn-outline-primary', 'btn-outline-danger');
					this.classList.replace('bg-white', 'bg-light'); // Ajuste visual
                } else {
                    this.innerHTML = '<i class="fa-solid fa-check-double me-1"></i>Marcar Todas';
                    this.classList.replace('btn-outline-danger', 'btn-outline-primary');
					this.classList.replace('bg-light', 'bg-white'); // Ajuste visual
                }
            });
        });
    </script>
</body>
</html>
