<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registo de Perfil | WinPost</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="/css/estilo.css">
</head>

<body class="bg-light">

	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container mt-5 mb-5" style="max-width: 900px;">
		
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h3 class="fw-bold text-dark"><i class="fa-solid fa-id-card-clip text-primary me-2"></i>Registar Novo Perfil</h3>
			<a href="/administrativo/perfis" class="btn btn-outline-secondary rounded-pill fw-bold">
				<i class="fa-solid fa-arrow-left me-2"></i>Voltar
			</a>
		</div>

		<div class="card border-0 shadow-sm rounded-4 overflow-hidden">
			<form th:action="@{/administrativo/perfis/salvar}" method="POST" th:object="${perfil}">
				
				<input type="hidden" th:field="*{id}">
				
				<div class="card-body p-5">
					
					<div class="row mb-5">
						<div class="col-md-12">
							<label class="form-label fw-bold text-secondary small">Nome do Perfil (Cargo)</label>
							<div class="input-group input-group-lg shadow-sm">
								<span class="input-group-text bg-white text-muted border-end-0"><i class="fa-solid fa-tag"></i></span>
								<input type="text" class="form-control border-start-0 ps-0" th:field="*{nome}" placeholder="Ex: GERENTE, VENDEDOR, SUPORTE..." required style="text-transform: uppercase;">
							</div>
							<div class="form-text mt-2 text-muted">Utilize nomes curtos e em maiúsculas para facilitar a identificação.</div>
						</div>
					</div>

					<div class="card border border-light bg-light rounded-3 shadow-sm">
						<div class="card-header bg-white border-bottom py-3">
							<h6 class="mb-0 fw-bold text-dark"><i class="fa-solid fa-list-check text-warning me-2"></i>Permissões de Acesso</h6>
							<small class="text-muted">Selecione o que os utilizadores com este perfil poderão fazer no sistema.</small>
						</div>
						<div class="card-body p-4">
							<div class="row g-3">
								
								<div class="col-md-4 col-sm-6" th:each="permissao : ${todasPermissoes}">
									<div class="form-check form-switch bg-white p-3 rounded-3 shadow-sm border border-light h-100 d-flex align-items-center">
										<input class="form-check-input ms-0 mt-0 me-3 fs-5" type="checkbox" 
											   th:value="${permissao}" 
											   th:field="*{permissoes}" 
											   th:id="${'check_' + permissao}">
										<label class="form-check-label fw-bold small text-secondary w-100 mb-0" 
											   style="cursor: pointer;"
											   th:for="${'check_' + permissao}" 
											   th:text="${#strings.replace(permissao, '_', ' ')}">
											NOME DA PERMISSAO
										</label>
									</div>
								</div>
								
							</div>
						</div>
					</div>

				</div>

				<div class="card-footer bg-white border-top-0 p-4 text-end">
					<button type="submit" class="btn btn-primary rounded-pill px-5 py-2 fw-bold shadow-sm">
						<i class="fa-solid fa-check me-2"></i>Guardar Perfil
					</button>
				</div>
				
			</form>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
