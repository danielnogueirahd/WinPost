<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registo de Perfil | WinPost</title>

<link
	href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
	rel="stylesheet">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="/css/estilo.css">

<style>
/* Tipografia Base e Fundo */
body {
	font-family: 'Inter', sans-serif;
	background-color: #f8f9fc !important;
}

/* Cartão Principal Premium */
.card-premium {
	border-radius: 16px;
	box-shadow: 0 8px 30px rgba(0, 0, 0, 0.03);
	border: 1px solid rgba(0, 0, 0, 0.05) !important;
}

/* Estilização Customizada do Input Group */
.input-group-custom {
	border-radius: 12px;
	border: 2px solid #eaedf1;
	transition: all 0.3s ease;
	background-color: #fff;
	padding: 0.25rem;
}

.input-group-custom:focus-within {
	border-color: #0d6efd;
	box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
}

.input-group-custom .input-group-text, .input-group-custom .form-control
	{
	border: none !important;
	background: transparent !important;
	box-shadow: none !important;
}

/* Títulos de Seção */
.section-label {
	font-size: 0.75rem;
	text-transform: uppercase;
	letter-spacing: 0.08em;
	font-weight: 700;
	color: #6c757d;
	margin-bottom: 0.75rem;
	display: block;
}

/* Estado Normal do Cartão */
.permission-card {
	border-radius: 12px;
	border: 2px solid #eaedf1;
	transition: all 0.2s ease-in-out;
	background-color: #fff;
}

/* Estado "Hover" */
.permission-card:hover {
	border-color: #d1e2ff;
	transform: translateY(-2px);
	box-shadow: 0 4px 12px rgba(13, 110, 253, 0.06);
}

/* Ajuste do Switch */
.form-switch .form-check-input {
	width: 2.5em;
	height: 1.25em;
}

.form-switch .form-check-input:checked {
	background-color: #0d6efd;
	border-color: #0d6efd;
}
</style>
</head>

<body class="d-flex flex-column min-vh-100">

	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container-xl mt-5 mb-5">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<div
				class="d-flex align-items-center ps-3 border-start border-4 border-primary rounded-1">
				<div>
					<h3 class="fw-bold text-dark mb-0 h4">Registrar Novo Perfil</h3>
					<p class="text-muted small mt-1 mb-0">Defina o nome do cargo e
						configure seus níveis de acesso.</p>
				</div>
			</div>
			<a href="/administrativo/perfis"
				class="btn btn-light border rounded-pill fw-bold text-secondary shadow-sm px-4 transition-all hover-primary">
				<i class="fa-solid fa-arrow-left me-2"></i>Voltar
			</a>
		</div>

		<div class="card card-premium overflow-hidden bg-white">
			<form th:action="@{/administrativo/perfis/salvar}" method="POST"
				th:object="${perfil}">

				<input type="hidden" th:field="*{id}">

				<div class="card-body p-4 p-md-5">

					<div class="row mb-5">
						<div class="col-lg-6 col-md-8">
							<label class="section-label">Nome do Perfil</label>

							<div class="input-group input-group-custom shadow-none border-1">
								<span class="input-group-text text-primary ps-3 pe-0"><i
									class="fa-solid fa-id-badge"></i></span> <input type="text"
									class="form-control fw-semibold text-dark" th:field="*{nome}"
									placeholder="Ex: ADMINISTRADOR" required>
							</div>

							<div
								class="d-flex align-items-start mt-2 p-2 rounded-3 bg-warning bg-opacity-10 border border-warning border-opacity-10">
								<i
									class="fa-solid fa-triangle-exclamation text-warning me-2 mt-1 shadow-none"
									style="font-size: 0.85rem;"></i> <span
									class="text-warning-emphasis small fw-medium"> <strong>Atenção:</strong>
									Utilize nomes curtos e em maiúsculas para facilitar a
									identificação.
								</span>
							</div>
						</div>
					</div>

					<div class="col-12 mt-4">
						<div
							class="d-flex justify-content-between align-items-end mb-4 border-bottom pb-2">
							<h5 class="fw-bold text-dark mb-0">
								<i class="fa-solid fa-user-shield me-2 text-primary"></i>
								Permissões de Acesso
							</h5>
							<button type="button" id="btnSelectAll"
								class="btn btn-sm btn-outline-primary fw-bold shadow-sm rounded-pill px-3 transition-all">
								<i class="fa-solid fa-check-double me-1"></i>Marcar Todas
							</button>
						</div>

						<div th:each="entry : ${permissoesAgrupadas}"
							class="mb-4 bg-light p-4 rounded-3 border">

							<div
								class="d-flex justify-content-between align-items-center mb-3">
								<h6 class="fw-bold text-primary mb-0 text-uppercase"
									style="font-size: 0.95rem; letter-spacing: 0.5px;">
									<i class="fa-solid fa-layer-group me-2"></i><span
										th:text="${entry.key}">Módulo</span>
								</h6>
								<button type="button"
									class="btn btn-sm btn-light border shadow-sm rounded-pill px-3 btn-marcar-modulo"
									style="font-size: 0.8rem; font-weight: 600;">
									<i class="fa-solid fa-check me-1"></i>Selecionar Módulo
								</button>
							</div>
							<div class="row g-3">
								<div class="col-xl-3 col-lg-4 col-md-6 col-12"
									th:each="permissao : ${entry.value}">

									<div class="card permission-card h-100 shadow-sm">
										<div class="card-body p-3 d-flex flex-column">

											<div
												class="d-flex justify-content-between align-items-start mb-2">
												<label class="form-check-label fw-bold text-dark mb-0"
													style="cursor: pointer; font-size: 0.95rem;"
													th:for="${'check_' + permissao}"
													th:text="${permissao.nomeAmigavel}"> Ação </label>

												<div
													class="form-check form-switch m-0 p-0 d-flex align-items-center">
													<input
														class="form-check-input toggle-permissao m-0 shadow-sm ms-2"
														style="cursor: pointer;" type="checkbox" role="switch"
														th:value="${permissao}" th:field="*{permissoes}"
														th:id="${'check_' + permissao}">
												</div>
											</div>

											<small class="text-muted mt-auto"
												style="font-size: 0.82rem; line-height: 1.4;"
												th:text="${permissao.descricao}"> Breve descrição do
												que esta permissão faz no sistema. </small>

										</div>
									</div>

								</div>
							</div>

						</div>
					</div>
				</div>

				<div
					class="card-footer bg-white border-top p-4 d-flex justify-content-end bg-light">
					<button type="submit"
						class="btn btn-primary rounded-pill px-5 py-2 fw-bold shadow-sm d-inline-flex align-items-center transition-all">
						<i class="fa-solid fa-floppy-disk me-2"></i>Guardar Perfil
					</button>
				</div>

			</form>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

	<script>
        document.addEventListener('DOMContentLoaded', function() {
            const btnSelectAll = document.getElementById('btnSelectAll');
            const checkboxes = document.querySelectorAll('.toggle-permissao');
            let todasSelecionadas = false;

            btnSelectAll.addEventListener('click', function() {
                todasSelecionadas = !todasSelecionadas;
                checkboxes.forEach(chk => chk.checked = todasSelecionadas);
                
                if(todasSelecionadas) {
                    this.innerHTML = '<i class="fa-solid fa-eraser me-1"></i>Desmarcar Todas';
                    this.classList.replace('btn-outline-primary', 'btn-outline-danger');
					this.classList.replace('bg-white', 'bg-light');
                } else {
                    this.innerHTML = '<i class="fa-solid fa-check-double me-1"></i>Marcar Todas';
                    this.classList.replace('btn-outline-danger', 'btn-outline-primary');
					this.classList.replace('bg-light', 'bg-white');
                }
            });
        });
        
     // LÓGICA PARA OS BOTÕES DE CADA MÓDULO
        const botoesModulo = document.querySelectorAll('.btn-marcar-modulo');

        botoesModulo.forEach(botao => {
            botao.addEventListener('click', function() {
                // Encontra a "caixa" cinza inteira deste módulo específico
                const moduloContainer = this.closest('.bg-light'); 
                
                // Pega apenas os checkboxes que estão DENTRO deste módulo
                const checkboxesModulo = moduloContainer.querySelectorAll('.toggle-permissao');
                
                // Verifica se TODOS os checkboxes deste módulo já estão marcados
                const todosMarcados = Array.from(checkboxesModulo).every(chk => chk.checked);

                // Se todos estão marcados, ele desmarca. Se falta algum, ele marca todos.
                checkboxesModulo.forEach(chk => chk.checked = !todosMarcados);

                // Altera o visual do botãozinho do módulo
                if (!todosMarcados) {
                    this.innerHTML = '<i class="fa-solid fa-eraser me-1"></i>Desmarcar Módulo';
                    this.classList.replace('btn-light', 'btn-outline-danger');
                    this.classList.remove('border');
                } else {
                    this.innerHTML = '<i class="fa-solid fa-check me-1"></i>Selecionar Módulo';
                    this.classList.replace('btn-outline-danger', 'btn-light');
                    this.classList.add('border');
                }
            });
        });
    </script>
</body>
</html>
