<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agenda | WinPost</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="/css/estilo.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* =========================================================================
   AGENDA — WinPost Design System
   Paleta: navy #1a2f6e | blue #2b52c0 | light-blue #eef2ff | cinza #f4f6f9
   ========================================================================= */

body { font-family: 'Inter', sans-serif; }

/* --- CONTAINER --- */
.agenda-container { max-width: 98%; margin: 0 auto; }

/* --- HEADER DA PÁGINA --- */
.border-start.border-primary { border-color: #2b52c0 !important; }

/* --- FILTER BAR --- */
.filter-bar {
	background: #fff;
	border-radius: 10px;
	padding: 10px 14px;
	box-shadow: 0 1px 4px rgba(0,0,0,0.06);
	display: flex;
	gap: 8px;
	border: 1px solid #eaecf0;
}

.filter-btn {
	border: 1px solid #e4e7ec;
	background: #f9fafb;
	color: #4b5563;
	border-radius: 20px;
	padding: 5px 14px;
	font-size: 0.78rem;
	font-weight: 600;
	transition: all 0.18s;
	white-space: nowrap;
	letter-spacing: 0.2px;
}
.filter-btn:hover, .filter-btn.active {
	background: #2b52c0;
	color: #fff;
	border-color: #2b52c0;
	box-shadow: 0 2px 8px rgba(43,82,192,0.18);
}

/* --- CALENDÁRIO --- */
.calendar-header-wrapper {
	background: #fff;
	border: 1px solid #eaecf0;
	border-bottom: none;
	padding: 14px 18px;
	border-radius: 12px 12px 0 0;
}

.calendar-grid {
	display: grid;
	grid-template-columns: repeat(7, 1fr);
	background: #fff;
	border-radius: 0 0 12px 12px;
	overflow: hidden;
	border: 1px solid #eaecf0;
	border-top: none;
}

.calendar-day-header {
	text-align: center;
	padding: 10px 0;
	font-weight: 700;
	color: #9ca3af;
	background-color: #f9fafb;
	border-bottom: 1px solid #eaecf0;
	border-right: 1px solid #eaecf0;
	font-size: 0.72rem;
	text-transform: uppercase;
	letter-spacing: 0.8px;
}

.calendar-day {
	min-height: 150px;
	max-height: 160px;
	overflow-y: auto;
	padding: 8px;
	border-right: 1px solid #f1f3f5;
	border-bottom: 1px solid #f1f3f5;
	transition: background-color 0.15s;
	background-color: #fff;
	position: relative;
	cursor: pointer;
}
.calendar-day::-webkit-scrollbar { width: 3px; }
.calendar-day::-webkit-scrollbar-track { background: transparent; }
.calendar-day::-webkit-scrollbar-thumb { background-color: #d1d5db; border-radius: 10px; }
.calendar-day:hover { background-color: #f8faff; }
.calendar-day:hover::-webkit-scrollbar-thumb { background-color: #9ca3af; }

.day-empty {
	background-color: #fafbfc;
	background-image: radial-gradient(#e9ecef 1px, transparent 1px);
	background-size: 14px 14px;
	opacity: 0.5;
	cursor: default;
}

.day-number {
	font-weight: 700;
	color: #374151;
	margin-bottom: 4px;
	font-size: 0.88rem;
	width: 26px;
	height: 26px;
	display: flex;
	align-items: center;
	justify-content: center;
	border-radius: 50%;
	letter-spacing: -0.3px;
}

.day-today {
	background: linear-gradient(135deg, #2b52c0, #1a2f6e);
	color: #fff !important;
	box-shadow: 0 2px 6px rgba(43,82,192,0.35);
}

/* --- BADGES DE EVENTO --- */
.event-badge {
	font-size: 0.69rem;
	margin-bottom: 2px;
	padding: 2px 7px;
	border-radius: 5px;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
	cursor: pointer;
	font-weight: 600;
	transition: transform 0.12s, box-shadow 0.12s;
	border: 1px solid transparent;
	display: flex;
	align-items: center;
	gap: 4px;
}
.event-badge:hover {
	transform: translateY(-1px);
	box-shadow: 0 3px 8px rgba(0,0,0,0.08);
	z-index: 5;
	position: relative;
}

.event-badge.TAREFA    { background: #f1f5f9; color: #475569; border-color: #e2e8f0; }
.event-badge.REUNIAO   { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
.event-badge.IMPORTANTE{ background: #fff1f2; color: #be123c; border-color: #fecdd3; }
.event-badge.NIVER     { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
.event-badge.ENVIO     { background: #f5f3ff; color: #6d28d9; border-color: #ddd6fe; }
.event-badge.FERIADO   { background: #fffbeb; color: #b45309; border: 1px dashed #fcd34d; }

.calendar-day-header:last-child,
.calendar-day:nth-child(7n) { border-right: none; }

/* --- SIDEBAR CARDS --- */
.sidebar-card {
	background: #fff;
	border-radius: 12px;
	border: 1px solid #eaecf0;
	box-shadow: 0 1px 6px rgba(0,0,0,0.05);
	margin-bottom: 1.25rem;
	overflow: hidden;
}

.sidebar-card-header {
	background: #f9fafb;
	border-bottom: 1px solid #eaecf0;
	padding: 12px 16px;
	font-weight: 700;
	font-size: 0.82rem;
	color: #374151;
	text-transform: uppercase;
	letter-spacing: 0.5px;
}

.mini-event-item {
	padding: 11px 16px;
	border-bottom: 1px solid #f3f4f6;
	display: flex;
	align-items: flex-start;
	gap: 11px;
}
.mini-event-item:last-child { border-bottom: none; }

.mini-event-icon {
	width: 34px;
	height: 34px;
	border-radius: 9px;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 0.82rem;
	flex-shrink: 0;
}

.check-task-btn { cursor: pointer; transition: all 0.2s; }
.check-task-btn:hover { transform: scale(1.12); }
.task-completed h6, .task-completed p { text-decoration: line-through; opacity: 0.4; }

/* --- MODAL DETALHES DIA --- */
.agenda-modal-container {
	background: #fff;
	border-radius: 14px;
	box-shadow: 0 20px 50px rgba(0,0,0,0.12);
	overflow: hidden;
}

.agenda-modal-header {
	padding: 22px 24px;
	border-bottom: 1px solid #f0f0f0;
	display: flex;
	justify-content: space-between;
	align-items: center;
	background: #f9fafb;
}
.agenda-modal-header h2 {
	margin: 0;
	font-size: 1.1rem;
	color: #1a2f6e;
	font-weight: 700;
}
.agenda-modal-header span { color: #2b52c0; }

.agenda-modal-body { padding: 24px; }

.info-grid {
	display: grid;
	grid-template-columns: 1fr 1fr;
	gap: 20px;
	margin-bottom: 16px;
	padding-bottom: 16px;
	border-bottom: 1px dashed #e5e7eb;
}
.info-group label {
	display: block;
	font-size: 0.75rem;
	color: #9ca3af;
	margin-bottom: 4px;
	text-transform: uppercase;
	letter-spacing: 0.6px;
	font-weight: 600;
}
.info-group p { margin: 0; font-size: 0.95rem; color: #111827; font-weight: 600; }

.agenda-modal-footer {
	padding: 14px 24px;
	background: #f9fafb;
	border-top: 1px solid #f0f0f0;
	display: flex;
	justify-content: flex-end;
	gap: 10px;
}

/* --- MODAL NOVO EVENTO --- */
.modal-modern-content {
	border: none;
	border-radius: 16px;
	box-shadow: 0 20px 50px rgba(0,0,0,0.14);
	overflow: hidden;
}

.avatar-initials {
	width: 40px; height: 40px;
	background: linear-gradient(135deg, #2b52c0, #1a2f6e);
	color: white; border-radius: 50%;
	display: flex; align-items: center; justify-content: center;
	font-size: 1rem; font-weight: 700;
	box-shadow: 0 4px 10px rgba(43,82,192,0.25);
}

.message-body-card {
	background-color: #fff;
	border: 1px solid #e5e7eb;
	border-radius: 10px;
	padding: 1.25rem;
	box-shadow: 0 1px 4px rgba(0,0,0,0.03);
	font-size: 0.92rem;
	line-height: 1.65;
	color: #111827;
}

.meta-badge { font-size: 0.73rem; padding: 4px 10px; border-radius: 50px; font-weight: 600; }

/* Botões de ação */
.btn-acao {
	width: 32px; height: 32px;
	padding: 0;
	display: inline-flex; align-items: center; justify-content: center;
	border-radius: 8px;
	border: none;
	background: transparent;
	transition: all 0.18s;
	cursor: pointer;
	font-size: 0.88rem;
}
.btn-acao.editar  { color: #2b52c0; }
.btn-acao.editar:hover  { background: rgba(43,82,192,0.1); }
.btn-acao.excluir { color: #dc2626; }
.btn-acao.excluir:hover { background: rgba(220,38,38,0.1); }
.btn-acao.disparar { color: #16a34a; }
.btn-acao.disparar:hover { background: rgba(22,163,74,0.1); }

/* Botão primário WinPost */
.btn-primary {
	background: linear-gradient(135deg, #2b52c0, #1a2f6e) !important;
	border: none !important;
	box-shadow: 0 2px 8px rgba(43,82,192,0.25) !important;
}
.btn-primary:hover {
	background: linear-gradient(135deg, #1a2f6e, #0f1d45) !important;
	box-shadow: 0 4px 12px rgba(43,82,192,0.35) !important;
}

/* Input search */
#buscaAgenda:focus { box-shadow: none; border-color: #2b52c0; }

/* Navegação do mês */
.btn-group.shadow-sm a { font-size: 0.82rem; }
.btn-group.shadow-sm a:hover { background: #eef2ff; color: #2b52c0 !important; }

/* Type cards (modal novo evento) */
.type-card { transition: all 0.18s; }
.type-card:hover { border-color: #2b52c0 !important; background: #f5f8ff !important; }
</style>

</head>

<body class="d-flex flex-column min-vh-100 bg-light">

	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<main class="flex-grow-1 bg-light">
		<div class="container-fluid px-4 px-xl-5 py-4 mb-4 agenda-container">

			<div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
				<div class="d-flex align-items-center ps-3 border-start border-4 border-primary">
					<div>
						<h2 class="fw-bold text-dark mb-0 h3">Minha Agenda</h2>
						<p class="text-muted mb-0 small">Painel de controle de eventos e disparos.</p>
					</div>
				</div>

				<div class="d-flex gap-2">
					<a th:href="@{/administrativo/agenda/exportar(mes=${mesExibicao}, ano=${anoExibicao})}"
						target="_blank"
						class="btn btn-outline-secondary shadow-sm fw-bold rounded-pill px-4">
						<i class="fa-solid fa-file-pdf text-danger me-2"></i>Exportar
					</a>

					<button class="btn btn-primary shadow-sm fw-bold rounded-pill px-4"
						sec:authorize="hasAuthority('AGENDA_CRIAR')"
						data-bs-toggle="modal" data-bs-target="#modalNovoEvento">
						<i class="fa-solid fa-plus me-2"></i>Novo Evento
					</button>
				</div>
			</div>

			<div class="row g-4">

				<div class="col-lg-8 col-xl-9">

					<div class="filter-bar mb-3 d-flex flex-wrap justify-content-between align-items-center">
						<div class="d-flex gap-2 align-items-center overflow-auto pe-2">
							<span class="text-muted fw-bold small align-self-center me-2"><i class="fa-solid fa-filter"></i> Filtros:</span>
							<button class="filter-btn active">Todos</button>
							<button class="filter-btn">
								<i class="fa-solid fa-paper-plane text-primary me-1"></i> Disparos
							</button>
							<button class="filter-btn">
								<i class="fa-solid fa-users text-info me-1"></i> Reuniões
							</button>
							<button class="filter-btn">
								<i class="fa-solid fa-triangle-exclamation text-danger me-1"></i> Urgentes
							</button>
							<button class="filter-btn">
								<i class="fa-solid fa-list-check text-secondary me-1"></i> Tarefas
							</button>
						</div>

						<div class="input-group input-group-sm mt-2 mt-md-0" style="width: auto; min-width: 220px;">
							<span class="input-group-text bg-light border-end-0 text-muted"><i class="fa-solid fa-magnifying-glass"></i></span>
							<input type="text" id="buscaAgenda" class="form-control border-start-0 bg-light shadow-none" placeholder="Pesquisar evento...">
						</div>
					</div>

					<div class="card shadow-sm border-0 bg-transparent">
						<div class="calendar-header-wrapper d-flex justify-content-between align-items-center flex-wrap gap-2">
							<div class="d-flex align-items-center gap-3">
								<div class="btn-group shadow-sm bg-white rounded-3">
									<a th:href="@{/administrativo/agenda(mes=${mesExibicao == 1 ? 12 : mesExibicao - 1}, ano=${mesExibicao == 1 ? anoExibicao - 1 : anoExibicao})}"
										class="btn btn-outline-light btn-sm text-dark border-0 py-1 px-3">
										<i class="fa-solid fa-angle-left"></i>
									</a>
									<a href="/administrativo/agenda" class="btn btn-outline-light btn-sm text-dark border-0 fw-bold px-3 border-start border-end">Hoje</a>
									<a th:href="@{/administrativo/agenda(mes=${mesExibicao == 12 ? 1 : mesExibicao + 1}, ano=${mesExibicao == 12 ? anoExibicao + 1 : anoExibicao})}"
										class="btn btn-outline-light btn-sm text-dark border-0 py-1 px-3">
										<i class="fa-solid fa-angle-right"></i>
									</a>
								</div>
								<h4 class="fw-bold text-dark mb-0 text-capitalize ms-1 fs-5">
									<span th:text="${T(java.time.Month).of(mesExibicao).getDisplayName(T(java.time.format.TextStyle).FULL, T(java.util.Locale).forLanguageTag('pt-BR'))}">Mês</span>
									<span class="text-muted fw-light" th:text="${anoExibicao}">2024</span>
								</h4>
							</div>
						</div>

						<div class="calendar-grid">
							<div class="calendar-day-header">Dom</div>
							<div class="calendar-day-header">Seg</div>
							<div class="calendar-day-header">Ter</div>
							<div class="calendar-day-header">Qua</div>
							<div class="calendar-day-header">Qui</div>
							<div class="calendar-day-header">Sex</div>
							<div class="calendar-day-header">Sáb</div>

							<th:block th:if="${diaSemanaInicio != 7}">
								<div th:each="i : ${#numbers.sequence(0, diaSemanaInicio - 1)}" class="calendar-day day-empty"></div>
							</th:block>

							<th:block th:each="dia : ${#numbers.sequence(1, totalDiasMes)}">
								<div class="calendar-day" th:onclick="'verDetalhesDia(' + ${dia} + ',' + ${mesExibicao} + ',' + ${anoExibicao} + ')'">
									<div class="day-number" th:text="${dia}"
										th:classappend="${dia == #temporals.createNow().dayOfMonth and mesExibicao == #temporals.createNow().monthValue and anoExibicao == #temporals.createNow().year} ? 'day-today'">
									</div>

									<th:block th:each="evento : ${listaEventos}">
										<div th:if="${evento.data.dayOfMonth == dia}"
											th:class="'event-badge ' + ${evento.tipo}"
											data-bs-toggle="tooltip" data-bs-placement="top"
											th:title="${evento.titulo}">
											<i th:if="${evento.tipo == 'NIVER'}" class="fa-solid fa-cake-candles"></i>
											<i th:if="${evento.tipo == 'ENVIO'}" class="fa-solid fa-paper-plane"></i>
											<i th:if="${evento.tipo == 'FERIADO'}" class="fa-regular fa-calendar-check"></i>
											<i th:if="${evento.tipo == 'TAREFA'}" class="fa-solid fa-list-check"></i>
											<i th:if="${evento.tipo == 'REUNIAO'}" class="fa-solid fa-users"></i>
											<i th:if="${evento.tipo == 'IMPORTANTE'}" class="fa-solid fa-triangle-exclamation"></i>
											<span th:text="${evento.titulo}">Título</span>
										</div>
									</th:block>
								</div>
							</th:block>
						</div>
					</div>
				</div>

				<div class="col-lg-4 col-xl-3">

					<div class="sidebar-card">
						<div class="sidebar-card-header d-flex justify-content-between align-items-center">
							<span><i class="fa-solid fa-angle-right"></i> Hoje</span>
						</div>
						<div class="card-body p-0" style="max-height: 400px; overflow-y: auto;">

							<div th:if="${#lists.isEmpty(listaEventos)}" class="text-center py-4 opacity-50">
								<i class="fa-regular fa-calendar-check fs-4 text-muted mb-2"></i>
								<p class="small text-muted mb-0">Nenhum evento registrado ainda.</p>
							</div>

							<th:block th:each="evento : ${listaEventos}">
								<div class="mini-event-item w-100"
									th:if="${evento.data.dayOfMonth == #temporals.createNow().dayOfMonth and evento.data.monthValue == #temporals.createNow().monthValue and evento.data.year == #temporals.createNow().year}">
									<div class="mini-event-icon"
										th:classappend="${
											evento.tipo == 'TAREFA' ? 'bg-secondary text-white' :
											(evento.tipo == 'REUNIAO' ? 'bg-info text-white' :
											(evento.tipo == 'IMPORTANTE' ? 'bg-danger text-white' :
											(evento.tipo == 'ENVIO' ? 'bg-primary text-white' : 'bg-warning text-dark')))
										}">
										<i class="fa-solid"
											th:classappend="${
												evento.tipo == 'TAREFA' ? 'fa-list-check' :
												(evento.tipo == 'REUNIAO' ? 'fa-users' :
												(evento.tipo == 'IMPORTANTE' ? 'fa-triangle-exclamation' :
												(evento.tipo == 'ENVIO' ? 'fa-paper-plane' : 'fa-tag')))
											}"></i>
									</div>
									<div class="flex-grow-1">
										<h6 class="mb-1 fw-bold fs-6 text-dark" th:text="${evento.titulo}">Título</h6>
										<p class="mb-0 text-muted" style="font-size: 0.73rem;">
											<i class="fa-regular fa-clock me-1"></i>
											<span th:text="${#temporals.format(evento.data, 'HH:mm')}">00:00</span>
										</p>
									</div>
									<div th:if="${evento.tipo == 'TAREFA'}"
										class="align-self-center ms-2 text-muted check-task-btn"
										title="Marcar como concluída"
										th:onclick="|concluirTarefa(${evento.id != null ? evento.id : 0}, this)|">
										<i class="fa-regular fa-circle fs-5"></i>
									</div>
								</div>
							</th:block>

						</div>
					</div>

					<div class="sidebar-card">
						<div class="sidebar-card-header d-flex justify-content-between align-items-center">
							<span><i class="fa-solid fa-paper-plane text-success me-2"></i> Disparos do Mês</span>
						</div>
						<div class="card-body p-0" style="max-height: 300px; overflow-y: auto;">
							<th:block th:each="evento : ${listaEventos}">
								<div class="mini-event-item" th:if="${evento.tipo == 'ENVIO'}">
									<div class="mini-event-icon bg-success text-white">
										<i class="fa-solid fa-paper-plane"></i>
									</div>
									<div>
										<h6 class="mb-1 fw-bold fs-6 text-dark" th:text="${evento.titulo}">Disparo</h6>
										<p class="mb-0 text-muted" style="font-size: 0.73rem;">
											<i class="fa-regular fa-calendar me-1"></i>
											<span th:text="${#temporals.format(evento.data, 'dd/MM/yyyy HH:mm')}">Data</span>
										</p>
									</div>
								</div>
							</th:block>
						</div>
					</div>

				</div>
			</div>
		</div>
	</main>

	<!-- MODAL DETALHES DIA -->
	<div class="modal fade" id="modalDetalhesDia" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered modal-lg">
			<div class="modal-content agenda-modal-container border-0">

				<div class="agenda-modal-header">
					<h2>Detalhes da Agenda <span id="modalTituloData"></span></h2>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>

				<div class="agenda-modal-body">
					<div id="listaDetalhes"></div>
					<div id="msgVazio" class="text-center py-4 d-none">
						<i class="fa-regular fa-calendar-xmark fs-3 text-muted mb-2 opacity-50"></i>
						<p class="text-muted small mb-0">Nenhum evento registrado.</p>
					</div>
				</div>

				<div class="agenda-modal-footer">
					<button type="button" class="btn btn-outline-secondary rounded-pill px-4 fw-bold" data-bs-dismiss="modal">Fechar</button>
					<button type="button" class="btn btn-primary fw-bold rounded-pill px-4" id="btnAdicionarNestaData">
						<i class="fa-solid fa-plus me-1"></i> Adicionar
					</button>
				</div>

			</div>
		</div>
	</div>

	<!-- MODAL NOVO EVENTO -->
	<div class="modal fade" id="modalNovoEvento" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered modal-lg">
			<div class="modal-content modal-modern-content">

				<div class="modal-header border-0 pb-0 ps-4 pe-4 pt-4">
					<h5 class="modal-title fw-bold text-dark fs-5">
						<span class="text-primary me-2"><i class="fa-regular fa-calendar-plus"></i></span> Novo Agendamento
					</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<form th:action="@{/administrativo/agenda/salvar}" method="post" th:object="${novoLembrete}">
					<div class="modal-body p-4 pt-3">
						<input type="hidden" id="inputId" name="id" />

						<div class="d-flex justify-content-between align-items-center mb-2 ms-1">
							<label class="small fw-bold text-muted text-uppercase" style="font-size: 0.75rem;">Qual o tipo do evento?</label>
						</div>

						<div id="areaSelecaoTipos" class="d-flex gap-2 mb-4 w-100 overflow-auto pb-2">
							<input type="radio" class="btn-check" name="tipo" id="tipoTarefa" value="TAREFA" checked>
							<label class="btn btn-outline-light text-start p-2 flex-fill border shadow-sm type-card" for="tipoTarefa" style="min-width: 120px;">
								<div class="d-flex flex-column align-items-center text-center">
									<div class="icon-box bg-info bg-opacity-10 text-dark rounded-circle mb-1 d-flex align-items-center justify-content-center" style="width: 30px; height: 30px;">
										<i class="fa-solid fa-list-check" style="font-size: 0.85rem;"></i>
									</div>
									<div class="fw-bold text-dark" style="font-size: 0.8rem;">Tarefa</div>
								</div>
								<div class="check-indicator text-info"><i class="fa-solid fa-circle-check"></i></div>
							</label>

							<input type="radio" class="btn-check" name="tipo" id="tipoReuniao" value="REUNIAO">
							<label class="btn btn-outline-light text-start p-2 flex-fill border shadow-sm type-card" for="tipoReuniao" style="min-width: 120px;">
								<div class="d-flex flex-column align-items-center text-center">
									<div class="icon-box bg-primary bg-opacity-10 text-dark rounded-circle mb-1 d-flex align-items-center justify-content-center" style="width: 30px; height: 30px;">
										<i class="fa-solid fa-users" style="font-size: 0.85rem;"></i>
									</div>
									<div class="fw-bold text-dark" style="font-size: 0.8rem;">Reunião</div>
								</div>
								<div class="check-indicator text-primary"><i class="fa-solid fa-circle-check"></i></div>
							</label>

							<input type="radio" class="btn-check" name="tipo" id="tipoImportante" value="IMPORTANTE">
							<label class="btn btn-outline-light text-start p-2 flex-fill border shadow-sm type-card" for="tipoImportante" style="min-width: 120px;">
								<div class="d-flex flex-column align-items-center text-center">
									<div class="icon-box bg-danger bg-opacity-10 text-dark rounded-circle mb-1 d-flex align-items-center justify-content-center" style="width: 30px; height: 30px;">
										<i class="fa-solid fa-triangle-exclamation" style="font-size: 0.85rem;"></i>
									</div>
									<div class="fw-bold text-dark" style="font-size: 0.8rem;">Urgente</div>
								</div>
								<div class="check-indicator text-dark"><i class="fa-solid fa-circle-check"></i></div>
							</label>

							<th:block th:each="tp : ${tiposPersonalizados}">
								<input type="radio" class="btn-check" name="tipo" th:id="'tipo' + ${tp.id}" th:value="${tp.nome}">
								<label class="btn btn-outline-light text-start p-2 flex-fill border shadow-sm position-relative type-card"
									th:for="'tipo' + ${tp.id}" style="min-width: 120px;" th:styleappend="'--cor-personalizada: ' + ${tp.corHex}">
									<div class="d-flex flex-column align-items-center text-center">
										<div class="icon-box bg-opacity-10 rounded-circle mb-1 d-flex align-items-center justify-content-center"
											style="width: 30px; height: 30px;" th:style="'background-color: ' + ${tp.corHex} + '20; color: ' + ${tp.corHex}">
											<i class="fa-solid" style="font-size: 0.85rem;" th:classappend="${tp.icone}"></i>
										</div>
										<div class="fw-bold text-dark" style="font-size: 0.8rem;" th:text="${tp.nome}">Pers.</div>
									</div>
									<div class="check-indicator" th:style="'color: ' + ${tp.corHex}">
										<i class="fa-solid fa-circle-check"></i>
									</div>
								</label>
							</th:block>
						</div>


						<div class="card border shadow-sm rounded-3 overflow-hidden mb-3">
							<input type="text" class="form-control border-0 rounded-0 fw-bold fs-6 px-3 pt-3 pb-2 shadow-none text-dark"
								id="inputTitulo" name="titulo" placeholder="Assunto do Evento" required>
							<hr class="m-0 text-muted opacity-25">
							<textarea class="form-control border-0 rounded-0 px-3 pt-2 pb-3 shadow-none text-secondary"
								name="descricao" rows="2" placeholder="Detalhes, links ou observações..." style="resize: none; font-size: 0.9rem;"></textarea>
						</div>

						<div class="row g-2 mb-2">
							<input type="hidden" name="dataHora" id="inputDataHoraCompleta">
							<div class="col-6">
								<div class="d-flex align-items-center bg-light rounded-2 px-3 py-2 border h-100">
									<i class="fa-regular fa-calendar text-primary me-2"></i>
									<div class="w-100">
										<label class="fw-bold text-muted mb-0" style="font-size: 0.60rem;">DIA</label>
										<input type="date" id="tempData" class="form-control form-control-sm border-0 p-0 bg-transparent shadow-none fw-bold text-dark" required>
									</div>
								</div>
							</div>
							<div class="col-6">
								<div class="d-flex align-items-center bg-light rounded-2 px-3 py-2 border h-100">
									<i class="fa-regular fa-clock text-primary me-2"></i>
									<div class="w-100">
										<label class="fw-bold text-muted mb-0" style="font-size: 0.60rem;">HORÁRIO</label>
										<input type="time" id="tempHora" class="form-control form-control-sm border-0 p-0 bg-transparent shadow-none fw-bold text-dark" required>
									</div>
								</div>
							</div>
						</div>
					</div>
					<div class="modal-footer border-0 px-4 pb-3 pt-0">
						<button type="button" class="btn btn-light btn-sm px-4 text-muted fw-bold rounded-pill" data-bs-dismiss="modal">Cancelar</button>
						<button type="submit" class="btn btn-primary btn-sm px-5 fw-bold rounded-pill shadow-sm">
							<i class="fa-solid fa-check me-2"></i>Agendar
						</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	<script th:src="@{/js/agenda.js}"></script>

	<script>
		document.addEventListener("DOMContentLoaded", function() {
			const inputData = document.getElementById("tempData");
			const inputHora = document.getElementById("tempHora");
			const inputFinal = document.getElementById("inputDataHoraCompleta");
			const formNovoEvento = document.querySelector("#modalNovoEvento form");

			function atualizarHidden() {
				if (inputData.value && inputHora.value) {
					inputFinal.value = inputData.value + "T" + inputHora.value;
				}
			}

			inputData.addEventListener("input", atualizarHidden);
			inputHora.addEventListener("input", atualizarHidden);

			if (formNovoEvento) {
				formNovoEvento.addEventListener("submit", function() {
					atualizarHidden();
				});
			}
		});
	</script>

</body>
</html>
