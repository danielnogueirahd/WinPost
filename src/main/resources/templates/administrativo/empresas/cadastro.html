<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinPost - Cadastro de Empresa</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilo.css">
    <link rel="stylesheet" href="/css/navbar.css">
    
    <style>
        .card-saas {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .form-label {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.9rem;
        }
        .form-control {
            border-radius: 8px;
            padding: 10px 15px;
            border: 1px solid #e2e8f0;
        }
        .form-control:focus {
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
        }
        .btn-saas-primary {
            background-color: #3182ce;
            border: none;
            border-radius: 8px;
            padding: 10px 25px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-saas-primary:hover {
            background-color: #2b6cb0;
            transform: translateY(-1px);
        }
    </style>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container py-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="mb-4">
                    <a href="/administrativo/empresas" class="text-decoration-none text-muted fw-semibold">
                        <i class="bi bi-arrow-left me-1"></i> Voltar para a listagem
                    </a>
                </div>

                <div class="card card-saas p-4 p-md-5">
                    <div class="mb-4">
                        <h2 class="fw-bold text-dark" th:text="${empresa.id == null ? 'Nova Empresa' : 'Editar Empresa'}">Nova Empresa</h2>
                        <p class="text-muted">Configure os dados cadastrais da empresa no sistema.</p>
                    </div>

                    <form th:action="@{/administrativo/empresas/salvar}" th:object="${empresa}" method="POST">
                        <input type="hidden" th:field="*{id}">

                        <div class="row g-4">
                            <div class="col-md-12">
                                <label for="razaoSocial" class="form-label">Razão Social / Nome Fantasia</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-building"></i></span>
                                    <input type="text" class="form-control border-start-0" id="razaoSocial" 
                                           th:field="*{razaoSocial}" placeholder="Ex: Grupo Input LTDA" required>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="cnpj" class="form-label">CNPJ (Opcional)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-card-text"></i></span>
                                    <input type="text" class="form-control border-start-0" id="cnpj" 
                                           th:field="*{cnpj}" placeholder="00.000.000/0000-00">
                                </div>
                            </div>

                            <div class="col-12 mt-5 d-flex justify-content-end gap-2">
                                <a href="/administrativo/empresas" class="btn btn-outline-secondary px-4 border-0 fw-bold">Cancelar</a>
                                <button type="submit" class="btn btn-saas-primary text-white shadow-sm">
                                    <i class="bi bi-check-lg me-2"></i> Salvar Empresa
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
