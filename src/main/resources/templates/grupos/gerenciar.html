<!DOCTYPE html>
<html xmlns:th="https://thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gerenciar Grupos | WinPost</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/2.3.6/css/dataTables.dataTables.css" />
<link rel="stylesheet" href="/css/estilo.css">

<style>
/* ESTILO EXTRA PARA TABELA COMPACTA (Idêntico ao Lista Contatos) */
.table-compact td, .table-compact th {
	padding: 0.6rem 0.5rem; 
	vertical-align: middle;
}
.text-small { font-size: 0.85rem; }
.text-xsmall { font-size: 0.75rem; }
</style>
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

	<div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container-fluid px-4 mt-4 mb-5 flex-grow-1">

        <div th:if="${mensagemErro} or ${erro}" class="alert alert-danger alert-dismissible fade show shadow-sm border-0 rounded-3 mb-4">
            <i class="fa-solid fa-triangle-exclamation me-2"></i> 
            <span th:text="${mensagemErro ?: erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

		<div class="d-flex justify-content-between align-items-center mb-4">
			<div class="d-flex align-items-center ps-3 border-start border-4 border-primary">
				<div>
					<h2 class="fw-bold text-dark mb-0 h3">Gerenciar Grupos</h2>
					<p class="text-muted mb-0 small">Segmentação e gestão para disparos.</p>
				</div>
			</div>

			<div class="d-flex gap-2">
				<a href="/mensagens/enviadas" class="btn btn-light text-secondary border shadow-sm fw-bold">
					<i class="fa-solid fa-clock-rotate-left"></i> <span class="d-none d-md-inline ms-1">Histórico</span>
				</a>
				<a href="/grupos/cadastro" class="btn btn-primary fw-bold shadow-sm"> 
                    <i class="fa-solid fa-plus"></i> <span class="d-none d-md-inline ms-1">Novo</span>
				</a>
			</div>
		</div>

        <div class="card shadow-sm mb-4 border-0">
			<div class="card-body p-3">
                <div class="row g-2 align-items-center">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 text-secondary"><i class="fas fa-search"></i></span> 
                            <input type="text" id="buscaRapida" class="form-control border-start-0 ps-0 shadow-none" placeholder="Buscar grupo rapidamente...">
                        </div>
                    </div>
                </div>
			</div>
		</div>

        <div class="card shadow-sm border-0">
			<div class="card-body p-0">
				<div class="table-responsive">
                    <table class="table table-hover table-compact mb-0" id="tabelaGrupos">
						<thead class="bg-light text-secondary">
							<tr>
                                <th style="width: 5%;">ID</th>
								<th style="width: 25%;">Grupo</th>
								<th style="width: 35%;">Descrição</th>
								<th style="width: 15%;" class="text-center">Membros</th>
								<th style="width: 10%;" class="text-center">Disparar</th>
								<th style="width: 10%;" class="text-end">Ações</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="grupo : ${listaGrupos}">
                                <td class="fw-bold text-muted small" th:text="${grupo.id}"></td>

                                <td>
                                    <div class="fw-bold text-dark text-truncate" style="max-width: 200px;" th:text="${grupo.nome}">Nome</div>
                                    <div class="text-xsmall text-muted mt-1"><i class="fa-solid fa-users text-primary"></i> Grupo de Envio</div>
								</td>

                                <td>
									<div class="text-small text-muted text-truncate" style="max-width: 300px;" th:text="${grupo.descricao}">
										Descrição
									</div>
								</td>

                                <td class="text-center">
									<span class="badge bg-light text-dark border px-2 py-1 fw-bold">
                                        <i class="fa-regular fa-user text-secondary me-1"></i> <span th:text="${#lists.size(grupo.contatos)}">0</span>
                                    </span>
								</td>

                                <td class="text-center">
                                    <a th:href="@{/mensagens/preparar-grupo/{id}(id=${grupo.id})}" class="btn btn-sm btn-success fw-bold px-3 py-1 shadow-sm" title="Preparar Envio"> 
                                        <i class="fa-regular fa-paper-plane"></i>
									</a>
                                </td>

                                <td class="text-end">
									<div class="btn-group">
										<a th:href="@{/grupos/editar/{id}(id=${grupo.id})}" class="btn btn-sm btn-outline-primary border-0" title="Editar"> 
                                            <i class="fa-solid fa-pen-to-square"></i>
										</a>
										<button type="button" class="btn btn-sm btn-outline-danger border-0"
											th:data-url="@{/grupos/excluir/{id}(id=${grupo.id})}"
											onclick="confirmarExclusao(this.getAttribute('data-url'))" title="Excluir">
											<i class="fa-regular fa-trash-can"></i>
										</button>
									</div>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>

        <div class="mt-3">
			<a href="/administrativo" class="text-decoration-none text-secondary small"> 
                <i class="fa-solid fa-arrow-left me-1"></i> Voltar ao Dashboard
			</a>
		</div>

	</div>

    <div th:replace="~{fragments/modals :: modalNovaMensagem}"></div>
	<div th:replace="~{fragments/modals :: modalExclusao}"></div>

    <div class="modal fade" id="modalConfirmarExclusao" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content border-0 shadow-lg">
				<div class="modal-header bg-danger text-white border-0">
					<h5 class="modal-title fw-bold">
						<i class="fa-solid fa-triangle-exclamation me-2"></i>Tem certeza?
					</h5>
					<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
				</div>
				<div class="modal-body text-center py-4">
					<p class="mb-0 text-secondary fs-5">Você está prestes a excluir este Grupo.</p>
					<p class="text-muted small">Apenas o grupo será excluído, os contatos não serão perdidos.</p>
				</div>
				<div class="modal-footer bg-light border-0 justify-content-center">
					<button type="button" class="btn btn-secondary px-4 fw-bold" data-bs-dismiss="modal">Cancelar</button>
					<a href="#" id="btnConfirmarExclusao" class="btn btn-danger px-4 fw-bold">Sim, Excluir</a>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.datatables.net/2.3.6/js/dataTables.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	<script>
        $(document).ready(function() {
            // Inicializa a tabela usando o mesmo padrão de Contatos
            var table = $('#tabelaGrupos').DataTable({
                language: {
                    url: 'https://cdn.datatables.net/plug-ins/1.13.7/i18n/pt-BR.json'
                },
                columnDefs: [
                    { orderable: false, targets: [4, 5] } // Remove ordenação dos botões Enviar e Ações
                ],
                paging: true,
                searching: true,
                dom: 'lrtip',
                lengthChange: false,
                pageLength: 10
            });

            // Conecta o campo de busca rápido à API do DataTables
            $('#buscaRapida').on('keyup', function() {
                table.search(this.value).draw();
            });
        });

        // Função do Modal de Exclusão (Padrão Contatos)
        function confirmarExclusao(url) {
            var modal = new bootstrap.Modal(document.getElementById('modalConfirmarExclusao'));
            document.getElementById('btnConfirmarExclusao').setAttribute('href', url);
            modal.show();
        }
    </script>

    <script th:if="${mensagemSucesso} or ${mensagem}">
        const msg = "[[${mensagemSucesso ?: mensagem}]]";
        if(msg && msg !== 'null' && msg.trim() !== '') {
            Swal.fire({
                title: 'Sucesso!',
                text: msg,
                icon: 'success',
                confirmButtonColor: '#0d6efd',
                confirmButtonText: 'Continuar',
                timer: 3000,
                timerProgressBar: true
            });
        }
    </script>

</body>
</html>
