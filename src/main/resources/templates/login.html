<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - WinPost</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
	href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700;900&display=swap"
	rel="stylesheet">
<style>
*, *::before, *::after {
	box-sizing: border-box;
	margin: 0;
	padding: 0
}

:root {
	--navy: #0D1B3E;
	--blue: #1A56DB;
	--blue-lt: #3B82F6;
	--accent: #EFF6FF;
	--gray-1: #F8F9FB;
	--gray-2: #E5E7EB;
	--gray-3: #9CA3AF;
	--gray-4: #6B7280;
	--text: #111827;
	--white: #FFFFFF
}

body {
	font-family: 'Inter', sans-serif;
	background: #f0f2f5;
	color: var(--text);
	margin: 0
}

.login-body {
	min-height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
	padding: 1rem
}

.login-container {
	background: var(--white);
	width: 100%;
	max-width: 1100px;
	height: 650px;
	border-radius: 16px;
	box-shadow: 0 10px 40px rgba(13, 27, 62, 0.08);
	overflow: hidden;
	display: flex;
}

.login-image-section {
	width: 50%;
	position: relative;
	background: #000;
	display: none;
	overflow: hidden;
}

.login-image-section.d-md-block {
	display: block
}

.login-bg-img {
	width: 100%;
	height: 100%;
	object-fit: cover;
	object-position: center;
	opacity: 0.35;
}

.login-content-overlay {
	position: absolute;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	display: flex;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	text-align: center;
	color: var(--white);
	padding: 40px;
	z-index: 2
}

.login-content-overlay p:first-child {
	font-size: 0.75rem;
	font-weight: 700;
	letter-spacing: 0.1em;
	text-transform: uppercase;
	margin-bottom: 0.5rem
}

.login-content-overlay h2 {
	font-family: 'Playfair Display', serif;
	font-size: 2.2rem;
	font-weight: 900;
	margin: 0.5rem 0;
	letter-spacing: -0.5px
}

.login-content-overlay p:last-child {
	font-size: 0.9rem;
	opacity: 0.85;
	line-height: 1.6
}

.login-form-section {
	width: 50%;
	display: flex;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	padding: 3rem 2rem;
	background: var(--white)
}

.form-wrapper {
	width: 100%;
	max-width: 380px
}

h3 {
	font-family: 'Playfair Display', serif;
	font-size: 1.8rem;
	font-weight: 900;
	color: var(--navy);
	margin-bottom: 2rem;
	text-align: center;
	letter-spacing: -0.5px
}

.alert {
	padding: 0.75rem 1rem;
	border-radius: 8px;
	font-size: 0.875rem;
	text-align: center;
	margin-bottom: 1.5rem;
	border: none
}

.alert-danger {
	background: #FEE2E2;
	color: #991B1B
}

.alert-info {
	background: #DBEAFE;
	color: #0C447C
}

.form-group {
	margin-bottom: 1.25rem
}

label {
	display: block;
	font-size: 0.75rem;
	font-weight: 700;
	text-transform: uppercase;
	letter-spacing: 0.05em;
	color: var(--gray-3);
	margin-bottom: 0.5rem
}

input[type="text"], input[type="password"] {
	width: 100%;
	padding: 0.75rem 1rem;
	border: 1px solid var(--gray-2);
	border-radius: 8px;
	font-size: 0.95rem;
	font-family: 'Inter', sans-serif;
	background: var(--white);
	color: var(--text);
	transition: border-color 0.2s, box-shadow 0.2s
}

input[type="text"]:focus, input[type="password"]:focus {
	outline: none;
	border-color: var(--blue);
	box-shadow: 0 0 0 3px var(--accent)
}

input::placeholder {
	color: var(--gray-3)
}

.form-check {
	display: flex;
	align-items: center;
	gap: 0.5rem;
	margin: 1.5rem 0;
}

.form-check-input {
	width: 18px;
	height: 18px;
	cursor: pointer;
	accent-color: var(--blue);
}

.form-check-label {
	font-size: 0.875rem;
	color: var(--gray-4);
	cursor: pointer;
	margin: 0
}

.btn-custom {
	width: 100%;
	padding: 0.85rem 1.5rem;
	background: var(--blue);
	color: var(--white);
	border: none;
	border-radius: 8px;
	font-weight: 600;
	font-size: 0.95rem;
	cursor: pointer;
	transition: background 0.2s, transform 0.15s;
	margin-top: 1.5rem;
	font-family: 'Inter', sans-serif
}

.btn-custom:hover {
	background: #1246BF;
	transform: translateY(-2px)
}

.btn-custom:active {
	transform: translateY(0)
}

.links-uteis {
	display: flex;
	justify-content: space-between;
	gap: 1rem;
	margin-top: 1.5rem;
	flex-wrap: wrap
}

.links-uteis a {
	font-size: 0.875rem;
	text-decoration: none;
	color: var(--gray-4);
	transition: color 0.2s
}

.links-uteis a:first-child:hover {
	color: var(--text)
}

.links-uteis a:last-child {
	color: var(--blue);
	font-weight: 600
}

.links-uteis a:last-child:hover {
	color: #1246BF
}

@media ( max-width :768px) {
	.login-image-section {
		display: none !important
	}
	.login-form-section {
		width: 100%;
		padding: 2rem 1.5rem
	}
	h3 {
		font-size: 1.5rem;
		margin-bottom: 1.5rem
	}
	.form-wrapper {
		max-width: 100%
	}
}
</style>
</head>
<body class="login-body">
	<div class="login-container">
		<div class="login-image-section d-md-block">
			<img src="/img/winpost-login.png" alt="Fundo" class="login-bg-img">
			<div class="login-content-overlay">
				<p>WinPost</p>
				<h2>Bem vindo</h2>
				<p>Gerencie seus contatos e dispare mensagens em um único lugar.</p>
			</div>
		</div>

		<div class="login-form-section">
			<div class="form-wrapper">
				<h3>Login</h3>

				<div th:if="${param.error}" class="alert alert-danger">Usuário
					ou senha inválidos.</div>
				<div th:if="${param.logout}" class="alert alert-info">Você
					saiu do sistema.</div>

				<form th:action="@{/login}" method="post">
					<div class="form-group">
						<label for="username">E-mail ou nome de usuário</label> <input
							type="text" id="username" name="username"
							placeholder="Insira seu e-mail ou usuário" required>
					</div>

					<div class="form-group">
						<label for="password">Senha</label> <input type="password"
							id="password" name="password" placeholder="Sua senha" required>
					</div>

					<div class="form-check">
						<input type="checkbox" id="remember-me" name="remember-me">
						<label for="remember-me"> Lembrar-me</label>
					</div>

					<button type="submit" class="btn-custom">Entrar</button>

					<div class="links-uteis">
						<a href="#">Esqueceu a senha?</a> <a href="#">Cadastre-se</a>
					</div>
				</form>
			</div>
		</div>
	</div>
</body>
</html>
