<div th:fragment="navbar"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

	<link rel="stylesheet" href="/css/navbar.css">

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm"
		th:fragment="navbar">
		<div class="container-fluid">

			<a class="navbar-brand fw-bold" th:href="@{/administrativo}"> <i
				class="fas fa-paper-plane text-primary me-2"></i> WINPOST
			</a>

			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="menuPrincipal">

				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<li class="nav-item"><a class="nav-link"
						th:href="@{/administrativo}">Dashboard</a></li>
					<li class="nav-item"><a class="nav-link"
						th:href="@{/listarContatos}">Contatos</a></li>
					<li class="nav-item"><a class="nav-link"
						th:href="@{/grupos/gerenciar}">Grupos</a></li>
					<li class="nav-item"><a class="nav-link"
						th:href="@{/mensagens/caixa/ENVIADAS}">Mensagens</a></li>
					<li class="nav-item"><a class="nav-link"
						th:href="@{/administrativo/agenda}">Agenda</a></li>
				</ul>

				<ul class="navbar-nav ms-auto align-items-center">

					<li class="nav-item dropdown me-3"><a
						class="nav-link dropdown-toggle position-relative" href="#"
						id="notificacoesMenu" role="button" data-bs-toggle="dropdown">
							<i class="fas fa-bell fs-5"></i> <span
							th:if="${qtdLembretes > 0}"
							class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
							th:text="${qtdLembretes}"> 3 </span>
					</a>
						<ul class="dropdown-menu dropdown-menu-end shadow border-0">
							<li><h6 class="dropdown-header text-uppercase text-muted">Amanhã
									na Agenda</h6></li>

							<li th:if="${qtdLembretes == 0}"><a
								class="dropdown-item text-muted" href="#">Tudo tranquilo!</a></li>

							<li th:each="lembrete : ${listaLembretes}"><a
								class="dropdown-item" th:href="@{/administrativo/agenda}"> <i
									class="fas fa-circle text-warning fa-xs me-2"></i> <span
									th:text="${lembrete.titulo}">Compromisso</span>
							</a></li>
							<li><hr class="dropdown-divider"></li>
							<li><a
								class="dropdown-item text-center small text-primary fw-bold"
								th:href="@{/administrativo/agenda}">Abrir Agenda Completa</a></li>
						</ul></li>

					<li class="nav-item dropdown"><a
						class="nav-link dropdown-toggle d-flex align-items-center"
						href="#" id="perfilMenu" role="button" data-bs-toggle="dropdown">
							<i class="fas fa-user-circle fs-4 me-2 text-secondary"></i> <span
							class="fw-semibold" sec:authentication="principal.username">Usuário</span>
					</a>
						<ul class="dropdown-menu dropdown-menu-end shadow border-0">
							<li><a class="dropdown-item" th:href="@{/perfil}"> <i
									class="fas fa-cog text-secondary me-2"></i> Meu Perfil
							</a></li>
							<li><hr class="dropdown-divider"></li>
							<li>
								<form th:action="@{/logout}" method="post" class="m-0 p-0">
									<button type="submit" class="dropdown-item text-danger">
										<i class="fas fa-sign-out-alt me-2"></i> Sair do Sistema
									</button>
								</form>
							</li>
						</ul></li>
				</ul>
			</div>
		</div>
	</nav>

	<div class="modal fade" id="modalLembretes" tabindex="-1"
		aria-hidden="true" data-bs-backdrop="false">
		<div
			class="modal-dialog modal-notificacao-posicao modal-dialog-scrollable">
			<div class="modal-content shadow-lg border-0">
				<div
					class="modal-header bg-warning text-dark py-2 border-bottom-0 rounded-top">
					<h6 class="modal-title fw-bold small">
						<i class="fa-solid fa-clock me-2"></i>Lembretes Futuros
					</h6>
					<button type="button" class="btn-close btn-sm"
						data-bs-dismiss="modal"></button>
				</div>
				<div class="modal-body p-0">
					<div class="list-group list-group-flush">
						<div th:if="${#lists.isEmpty(listaLembretes)}"
							class="text-center py-5">
							<i
								class="fa-regular fa-calendar-check fs-2 text-muted opacity-25 mb-2"></i>
							<p class="text-muted small fw-bold mb-0">Tudo em dia!</p>
						</div>

						<a th:each="lembrete : ${listaLembretes}"
							th:href="${lembrete.tipo == 'NIVER'} ? @{/editarContatos/{id}(id=${lembrete.idReferencia})} : @{/administrativo/agenda(mes=${lembrete.dataEvento.monthValue}, ano=${lembrete.dataEvento.year})}"
							class="list-group-item list-group-item-action p-3 notificacao-item"
							style="border-left-color: #ffc107 !important;">

							<div
								class="d-flex w-100 justify-content-between align-items-center mb-1">
								<strong class="text-dark small" style="font-size: 0.85rem;"
									th:text="${lembrete.titulo}">Título</strong> <span
									class="badge bg-light text-secondary border">Amanhã</span>
							</div>

							<p class="mb-1 text-muted small" th:text="${lembrete.descricao}">Descrição...</p>

							<div class="mt-2" th:if="${lembrete.tipo == 'NIVER'}">
								<span
									class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 rounded-pill px-2">
									<i class="fa-solid fa-gift me-1"></i> Ver Contato
								</span>
							</div>
						</a>
					</div>
				</div>
				<div
					class="modal-footer bg-light p-1 justify-content-center rounded-bottom">
					<a href="/administrativo/agenda"
						class="btn btn-link btn-sm text-decoration-none fw-bold text-secondary">Ver
						agenda completa</a>
				</div>
			</div>
		</div>
	</div>

	<script>
        function marcarEFechar(id, event) {
            if(event) event.stopPropagation(); 
            fetch('/mensagens/marcar-lida/' + id, { method: 'POST' })
            .then(response => {
                if(response.ok) {
                    removerItemVisualmente(id);
                    atualizarContadorBadge();
                }
            })
            .catch(console.error);
        }

        function lerENavegar(id, url, event) {
            if(event) event.preventDefault(); 
            fetch('/mensagens/marcar-lida/' + id, { method: 'POST' })
            .then(() => {
                atualizarContadorBadge();
                window.location.href = url; 
            })
            .catch(() => {
                window.location.href = url; 
            });
        }

        function removerItemVisualmente(id) {
            const elemento = document.getElementById('notificacao-' + id);
            if (elemento) {
                elemento.style.opacity = '0';
                elemento.style.transform = 'translateX(50px)';
                setTimeout(() => {
                    elemento.remove();
                    verificarListaVazia();
                }, 300);
            }
        }

        function atualizarContadorBadge() {
            const badge = document.getElementById('badgeGeral');
            const contador = document.getElementById('contadorTexto');

            if(badge && contador) {
                let valorAtual = parseInt(contador.innerText);
                let novoValor = valorAtual - 1;
                if (novoValor <= 0) {
                    badge.style.display = 'none'; 
                } else {
                    contador.innerText = novoValor;
                }
            }
        }

        function verificarListaVazia() {
            const container = document.getElementById('listaNotificacoesContainer');
            if(!container) return; 
            const itens = container.querySelectorAll('[id^="notificacao-"]');
            if (itens.length === 0) {
                const msgVazia = document.getElementById('msgSemNotificacaoJS');
                if(msgVazia) msgVazia.classList.remove('d-none');
            }
        }
    </script>
</div>
