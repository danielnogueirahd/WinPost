<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lista de Contatos | WinPost</title>

<link
	href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
	rel="stylesheet">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet"
	href="https://cdn.datatables.net/2.3.6/css/dataTables.dataTables.css" />
<link rel="stylesheet" href="/css/estilo.css">

</head>

<body class="d-flex flex-column min-vh-100">

	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container-fluid px-4 mt-4 mb-5">

		<div
			class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
			<div
				class="d-flex align-items-center ps-3 border-start border-4 border-primary rounded-1">
				<div>
					<h2 class="fw-bold text-dark mb-0 h4">Contatos</h2>
					<p class="text-muted mb-0 small">Gerenciamento inteligente da
						base.</p>
				</div>
			</div>

			<div class="d-flex gap-2">
				<button type="button"
					class="btn btn-light text-dark border shadow-sm fw-bold rounded-pill px-3"
					data-bs-toggle="modal" data-bs-target="#modalRelatorio">
					<i class="fa-solid fa-file-pdf text-danger me-1"></i> Relatório
				</button>
				<a href="/cadastroContatos"
					class="btn btn-primary fw-bold shadow-sm rounded-pill px-4"
					sec:authorize="hasAuthority('CONTATO_CRIAR')"> <i
					class="fa-solid fa-plus me-1"></i> Novo
				</a>
			</div>
		</div>

		<!-- Barra de Pesquisa Rápida (Aquela que já estava funcionando) -->
		<div class="search-bar card-premium mb-4">
			<form method="GET" action="/listarContatos">
				<div class="row g-3 align-items-end">
					<div class="col-md-5">
						<label class="small fw-bold text-secondary mb-1">Busca
							Geral</label>
						<div class="input-group input-group-custom">
							<span class="input-group-text bg-transparent border-0 text-muted"><i
								class="fas fa-search"></i></span> <input type="text" id="buscaRapida"
								name="nome" class="form-control" placeholder="Nome, e-mail..."
								th:value="${param.nome}">
						</div>
					</div>
					<div class="col-md-3">
						<label class="small fw-bold text-secondary mb-1">Localização</label>
						<div class="input-group input-group-custom">
							<span class="input-group-text bg-transparent border-0 text-muted"><i
								class="fa-solid fa-location-dot"></i></span> <input type="text"
								id="buscaCidade" name="cidade" class="form-control"
								placeholder="Cidade..." th:value="${param.cidade}">
						</div>
					</div>
					<div class="col-md-4 d-flex gap-2">
						<button type="submit"
							class="btn btn-primary fw-bold rounded-pill px-4 shadow-sm w-100">Pesquisar</button>
						<button type="submit"
							class="btn btn-outline-secondary fw-bold rounded-pill px-3 shadow-sm"
							formtarget="_blank" formaction="/relatorio/etiquetas">
							<i class="fas fa-tags"></i>
						</button>
					</div>
				</div>
			</form>
		</div>

		<!-- Tabela de Contatos -->
		<div class="card card-premium bg-white">
			<div class="card-body p-0">
				<div class="table-responsive">
					<table class="table table-hover align-middle mb-0 text-nowrap"
						id="tabela">
						<thead class="table-custom-header bg-light">
							<tr>
								<th class="ps-4">ID</th>
								<th>Nome / Cadastro</th>
								<th>Contato</th>
								<th class="d-none d-lg-table-cell">Endereço Completo</th>
								<th class="text-end pe-4">Ações</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="contato : ${listaContatos}">
								<td class="ps-4 fw-bold text-muted small"
									th:text="${contato.id}"></td>

								<td>
									<div class="fw-bold text-dark" th:text="${contato.nome}"></div>
									<div class="text-muted small" style="font-size: 0.75rem;">
										<i class="far fa-calendar me-1"></i> Nasc: <span
											th:text="${contato.dataNascimento != null and !contato.dataNascimento.isEmpty() ? contato.dataNascimento : '-'}"></span>
									</div>
								</td>

								<td>
									<div th:if="${contato.email}" class="text-dark small mb-1">
										<i class="far fa-envelope me-1 text-primary opacity-75"></i> <span
											th:text="${contato.email}"></span>
									</div>
									<div class="small text-muted">
										<i class="fas fa-phone me-1 text-success opacity-75"></i> <span
											th:text="${contato.telefone}"></span>
									</div>
								</td>

								<td class="d-none d-lg-table-cell endereco-cell">
									<div class="text-dark fw-medium">
										<span th:text="${contato.rua}"></span>, <span
											th:text="${contato.numero}"></span>
									</div>
									<div class="text-muted" style="font-size: 0.75rem;">
										<span th:text="${contato.bairro}"></span> • <span
											th:text="${contato.cidade}"></span>/<span
											th:text="${contato.estado}"></span>
									</div>
								</td>

								<td class="text-end pe-4">
	<div class="d-flex justify-content-end gap-1">
		<a th:href="@{/editarContatos/{id}(id=${contato.id})}"
			class="btn btn-action text-primary" data-bs-toggle="tooltip"
			title="Editar"> 
			<i class="fa-solid fa-pen-to-square"></i>
		</a>

		<button type="button" class="btn btn-action text-danger"
			data-bs-toggle="tooltip" title="Excluir"
			th:onclick="'confirmarExclusao(' + ${contato.id} + ')'">
			<i class="fa-solid fa-trash"></i>
		</button>
	</div>
</td>
						</tbody>
					</table>
				</div>
			</div>
		</div>

		<div class="mt-4">
			<a href="/administrativo"
				class="text-decoration-none text-secondary small transition-all hover-primary">
				<i class="fa-solid fa-arrow-left me-1"></i> Voltar ao Dashboard
			</a>
		</div>
	</div>

	<!-- Fragmento do Modal de Relatório e Etiquetas -->
	<div th:replace="~{fragments/modals :: modalRelatorio}"></div>

	<!-- Scripts Padrões -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
	<script
		src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
	<script src="https://cdn.datatables.net/2.3.6/js/dataTables.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	<!-- O Nosso Script Principal da Tela -->
	<script>
		$(document).ready(function() {
			
			// Inicialização do DataTables
			var table = $('#tabela').DataTable({
				language: {
					url: 'https://cdn.datatables.net/plug-ins/1.13.7/i18n/pt-BR.json'
				},
				columnDefs: [{
					orderable: false,
					targets: -1
				}],
				paging: true,
				dom: 'rtip', 
				pageLength: 10
			});

			// Pesquisa rápida local
			$('#buscaRapida').on('keyup', function() {
				table.search(this.value).draw();
			});
			$('#buscaCidade').on('keyup', function() {
				table.column(3).search(this.value).draw();
			});

			// Inicializar Tooltips
			var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
			tooltipTriggerList.map(function(el) {
				return new bootstrap.Tooltip(el);
			});

            // ========================================================
            // A MÁGICA DO BOTÃO DE ETIQUETAS ACONTECE AQUI!
            // ========================================================
            
            // Usamos delegação de eventos para garantir que o script pegue o botão
            // mesmo que ele tenha vindo de outro arquivo via Thymeleaf (o modalRelatorio)
            $(document).on('click', '#btnGerarEtiquetasDireto', function(e) {
                e.preventDefault(); // Impede o botão de só piscar a tela
                
                var $form = $(this).closest('form');
                
                // Força o destino do formulário para o método Java de Etiquetas
                $form.attr('action', '/relatorio/etiquetas');
                
                // Dá o comando de enviar os dados
                $form.submit();
                
                // Volta o form pro normal 1 segundo depois
                setTimeout(function() {
                    $form.attr('action', '/relatorio/pdf');
                }, 1000);
            });
            // ========================================================

		});

		// Função Nova, Única e Limpa do SweetAlert2
		function confirmarExclusao(idContato) {
			Swal.fire({
				title: 'Tem certeza?',
				text: "Esta ação não pode ser revertida e o contato será apagado!",
				icon: 'warning',
				showCancelButton: true,
				confirmButtonColor: '#d33',
				cancelButtonColor: '#3085d6',
				confirmButtonText: 'Sim, excluir!',
				cancelButtonText: 'Cancelar'
			}).then((result) => {
				if (result.isConfirmed) {
					// Envia para o Controller apagar
					window.location.href = '/removerContatos/' + idContato;
				}
			});
		}
	</script>
</body>
</html>
